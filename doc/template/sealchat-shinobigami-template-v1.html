<!DOCTYPE html>
<!-- sealchat-shinobigami-template:v1 -->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* 和风色彩系统 */
      --bg: #e6e4dc; /* 偏灰暗的和纸背景色 */
      --paper: #f2f0e9; /* 纸张面板色 */
      --paper-strong: #faf9f5; /* 强高光面板 */
      --ink: #1a1714; /* 浓墨 */
      --ink-dim: #6b645b; /* 淡墨 */
      --panel: #1f1b18; /* 漆黑面板 */
      --panel-soft: #38332e;
      --line: #b0a89d;
      --line-strong: #1a1714; /* 边线使用实墨 */
      
      --active: #a61b12; /* 朱砂/暗红 */
      --active-ink: #f0eee6;
      --roll: #731008;
      --roll-ink: #f0eee6;
      --warn: #8a1d13;
      --warn-ink: #fff;
      --muted: #b8b3a7;
      --chip: #e8e6df;
      
      --shadow: rgba(26, 23, 20, 0.15);
      
      /* 忍神特化分野颜色（加深处理，仿印泥质感） */
      --cat-0: #ad5307; /* 器术：暗橙 */
      --cat-1: #4a6b22; /* 体术：苔绿 */
      --cat-2: #8f1212; /* 忍术：血红 */
      --cat-3: #8a782e; /* 谋术：枯黄 */
      --cat-4: #1c3d66; /* 战术：靛蓝 */
      --cat-5: #4e356e; /* 妖术：紫黑 */
      
      /* 字体：优先采用明朝体/宋体及楷体，凸显忍法帖质感 */
      --font-main: "Noto Serif SC", "Noto Serif TC", "Noto Serif JP", "Songti SC", "SimSun", serif;
      --font-ui: "STKaiti", "KaiTi", "Kaiti SC", "Noto Serif SC", "Songti SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      /* 和纸纹理暗花 */
      background-image:
        linear-gradient(90deg, rgba(26,23,20,0.04) 1px, transparent 1px),
        linear-gradient(rgba(26,23,20,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      background-position: center;
      color: var(--ink);
      font-family: var(--font-main);
      min-height: 100vh;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    body {
      padding: 16px;
    }

    textarea,
    .matrix-scroll {
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track,
    ::-webkit-scrollbar-corner {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 0;
    }

    body:hover::-webkit-scrollbar-thumb,
    textarea:hover::-webkit-scrollbar-thumb,
    .matrix-scroll:hover::-webkit-scrollbar-thumb {
      background: var(--ink-dim);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink);
    }

    button,
    input,
    textarea {
      font: inherit;
      outline: none;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      color: inherit;
    }

    #app {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sheet {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 具有TRPG实物风格的硬朗卡片基类 */
    .summary, .matrix-tools, .section-card {
      background: var(--paper);
      border: 2px solid var(--line-strong);
      border-radius: 0;
      box-shadow: 4px 4px 0 rgba(26, 23, 20, 0.1);
    }

    .summary {
      padding: 14px 16px;
    }

    .summary__top,
    .summary__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .summary__bottom {
      margin-top: 12px;
    }

    .summary__name {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      position: relative;
      padding-left: 14px;
    }

    /* 角色名前方的朱砂红线装饰 */
    .summary__name::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      height: 80%;
      width: 4px;
      background: var(--active);
    }

    .summary__avatar {
      width: 48px;
      height: 48px;
      border-radius: 0;
      object-fit: cover;
      border: 2px solid var(--line-strong);
      background: var(--paper-strong);
    }

    .summary__identity {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .summary__chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* 刻印风格芯片标签 */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 0;
      background: var(--paper-strong);
      border: 1px solid var(--line-strong);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.2;
      box-shadow: 1px 1px 0 rgba(26, 23, 20, 0.2);
      transition: all 0.1s ease;
    }

    .chip--danger {
      background: rgba(166, 27, 18, 0.08);
      border-color: var(--active);
      color: var(--active);
      font-weight: bold;
    }

    .chip--toggle:hover {
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 rgba(26, 23, 20, 0.2);
    }
    
    .chip--toggle:active {
      transform: translate(1px, 1px);
      box-shadow: 0 0 0 transparent;
    }

    .chip--toggle.is-active {
      background: var(--panel);
      color: #fff;
      border-color: var(--panel);
    }

    /* 生命值计分板 */
    .hp-panel {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-ui);
      padding: 6px 12px;
      background: var(--paper-strong);
      border: 2px solid var(--line-strong);
      border-radius: 0;
      box-shadow: 2px 2px 0 rgba(26, 23, 20, 0.1);
    }

    .hp-panel__value {
      font-size: 24px;
      font-weight: 900;
      font-family: var(--font-main);
      color: var(--active);
      letter-spacing: 2px;
    }

    .hp-panel__meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* 小功能按钮实体化 */
    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 0;
      background: var(--paper-strong);
      border: 1px solid var(--line-strong);
      font-size: 12px;
      font-weight: bold;
      font-family: var(--font-ui);
      box-shadow: 1px 1px 0 rgba(26, 23, 20, 0.2);
      transition: all 0.1s ease;
    }

    .mini-btn:hover {
      background: var(--panel);
      color: #fff;
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 rgba(26, 23, 20, 0.3);
    }

    .mini-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 0 0 0 transparent;
    }

    .matrix-shell {
      display: grid;
      grid-template-columns: repeat(6, minmax(118px, 1fr));
      gap: 0;
      align-items: start;
      min-width: 720px;
      border: 2px solid var(--line-strong); /* 整个矩阵外框 */
      background: var(--paper-strong);
      box-shadow: 4px 4px 0 rgba(26, 23, 20, 0.1);
    }

    .matrix-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }

    .matrix-scroll.is-dragging {
      cursor: grabbing;
      user-select: none;
    }

    /* 矩阵列：取消圆角，改用清晰的列分割 */
    .matrix-col {
      border-right: 1px solid var(--line-strong);
      border-radius: 0;
      overflow: hidden;
      min-width: 0;
      position: relative;
      isolation: isolate;
      background: transparent;
    }
    .matrix-col:last-child {
      border-right: none;
    }

    /* 强损伤列：黑暗沉沦与血印 */
    .matrix-col.is-damaged-strong {
      background: #1c1917;
      border-color: #38332e;
    }

    .matrix-col.is-damaged-strong::before,
    .matrix-col.is-damaged-strong::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 6px;
      pointer-events: none;
      z-index: 4;
      background: linear-gradient(180deg, #570602, #b8160e, #7a0d08);
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }

    .matrix-col.is-damaged-strong::before {
      left: 0;
      clip-path: polygon(100% 0, 34% 5%, 78% 12%, 18% 19%, 82% 27%, 22% 36%, 76% 46%, 14% 56%, 84% 66%, 22% 77%, 74% 88%, 16% 96%, 100% 100%, 0 100%, 0 0);
    }

    .matrix-col.is-damaged-strong::after {
      right: 0;
      clip-path: polygon(0 0, 66% 4%, 22% 12%, 84% 20%, 20% 28%, 78% 37%, 16% 46%, 82% 57%, 24% 68%, 80% 79%, 26% 89%, 86% 96%, 0 100%, 100% 100%, 100% 0);
    }

    /* 矩阵表头：黑色木牌质感 */
    .matrix-col__header {
      background: var(--panel);
      color: #fff;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-bottom: 2px solid var(--line-strong);
    }

    .matrix-col__title {
      display: grid;
      grid-template-columns: 14px 1fr 14px;
      align-items: center;
      gap: 0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      font-family: var(--font-main);
    }

    .matrix-col__title span:first-child {
      grid-column: 2;
      justify-self: center;
      text-align: center;
    }

    .matrix-col__title span:last-child {
      grid-column: 3;
      justify-self: end;
      min-width: 10px;
      text-align: right;
    }

    /* 损伤封印血章 */
    .matrix-col__seal-icon {
      grid-column: 3;
      justify-self: end;
      width: 14px;
      height: 14px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .matrix-col__seal-icon::before {
      content: '';
      width: 12px;
      height: 12px;
      border-radius: 58% 42% 62% 38% / 64% 46% 54% 36%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.2) 0 14%, transparent 15%),
                  linear-gradient(180deg, #d82b1c, #8f0800);
      transform: rotate(28deg);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.5), 0 0 2px rgba(0,0,0,0.5);
    }

    .matrix-col__seal-icon::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.6);
      transform: rotate(28deg) translateX(1px);
    }

    .matrix-col__toggles {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* 得意/损伤 按钮（类似和风附笺） */
    .matrix-col__toggle {
      width: 100%;
      min-height: 20px;
      padding: 0 2px;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      transition: all 0.1s;
    }

    .matrix-col__toggle:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .matrix-col__toggle.is-active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .matrix-col__toggle--specialty.is-active {
      background: var(--active);
      color: #fff;
      border-color: var(--active);
    }

    .matrix-col__damage-bar {
      min-height: 8px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(166, 27, 18, 0.4) 0,
        rgba(166, 27, 18, 0.4) 2px,
        transparent 2px,
        transparent 6px
      );
      border-bottom: 1px solid var(--panel);
    }

    .matrix-col.is-damaged-strong .matrix-col__header {
      background: #000;
      border-bottom: 2px solid var(--active);
    }

    .matrix-col.is-damaged-strong .matrix-col__toggle {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border-color: rgba(255,255,255,0.1);
    }

    .matrix-col.is-damaged-strong .matrix-col__toggle.is-active {
      background: var(--active);
      color: #fff;
      border-color: var(--active);
    }

    .matrix-grid {
      display: flex;
      flex-direction: column;
    }

    /* 矩阵行 */
    .matrix-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 42px;
      align-items: stretch;
      min-height: 36px;
      border-bottom: 1px solid var(--line);
      background: transparent;
      transition: background 0.1s;
    }

    .matrix-row:nth-child(even) {
      background: rgba(0,0,0,0.03);
    }

    /* 行状态与修饰 */
    .matrix-row.is-active {
      background: rgba(0,0,0,0.05);
    }

    .matrix-row.is-active.category-0 { background: rgba(171, 83, 7, 0.1); border-left: 2px solid var(--cat-0); }
    .matrix-row.is-active.category-1 { background: rgba(74, 107, 34, 0.1); border-left: 2px solid var(--cat-1); }
    .matrix-row.is-active.category-2 { background: rgba(143, 18, 18, 0.08); border-left: 2px solid var(--cat-2); }
    .matrix-row.is-active.category-3 { background: rgba(138, 120, 46, 0.1); border-left: 2px solid var(--cat-3); }
    .matrix-row.is-active.category-4 { background: rgba(28, 61, 102, 0.08); border-left: 2px solid var(--cat-4); }
    .matrix-row.is-active.category-5 { background: rgba(78, 53, 110, 0.08); border-left: 2px solid var(--cat-5); }

    .matrix-row.is-active.category-0 .matrix-row__toggle { color: var(--cat-0); }
    .matrix-row.is-active.category-1 .matrix-row__toggle { color: var(--cat-1); }
    .matrix-row.is-active.category-2 .matrix-row__toggle { color: var(--cat-2); }
    .matrix-row.is-active.category-3 .matrix-row__toggle { color: var(--cat-3); }
    .matrix-row.is-active.category-4 .matrix-row__toggle { color: var(--cat-4); }
    .matrix-row.is-active.category-5 .matrix-row__toggle { color: var(--cat-5); }

    /* 简洁模式色彩适配 */
    .sheet.is-compact .matrix-row.is-active.category-0,
    .sheet.is-compact .matrix-row.is-active.category-1,
    .sheet.is-compact .matrix-row.is-active.category-2,
    .sheet.is-compact .matrix-row.is-active.category-3,
    .sheet.is-compact .matrix-row.is-active.category-4,
    .sheet.is-compact .matrix-row.is-active.category-5 {
      background: rgba(0,0,0,0.06);
      border-left: 2px solid var(--ink);
    }
    .sheet.is-compact .matrix-row.is-active .matrix-row__toggle {
      color: var(--ink);
    }

    /* 黑点（墨迹印记） */
    .matrix-row__toggle {
      border-right: 1px dotted var(--line);
      background: transparent;
      font-family: var(--font-main);
      font-size: 14px;
      color: transparent; /* 未激活时不显示点，虽然逻辑中未输出点 */
    }

    .matrix-row__toggle.is-on {
      background: transparent;
    }

    .matrix-row__name,
    .matrix-row__value {
      min-width: 0;
      text-align: left;
      font-family: var(--font-main);
      transition: all 0.1s;
    }

    .matrix-row__name {
      padding: 0 8px;
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }

    .matrix-row__name:hover {
      background: rgba(0,0,0,0.05);
      color: var(--active);
    }

    .matrix-row__value {
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      border-left: 1px dotted var(--line);
      background: transparent;
      position: relative;
    }

    .matrix-row__value:hover {
      background: var(--roll);
      color: var(--roll-ink);
    }

    /* 损伤行的强覆盖感（横线划掉） */
    .matrix-row.is-damaged-strong {
      background: transparent;
      border-bottom: 1px solid #333;
    }

    .matrix-row.is-damaged-strong .matrix-row__toggle {
      border-right-color: #333;
      color: #666;
    }

    .matrix-row.is-damaged-strong .matrix-row__name {
      color: #666;
      text-decoration: line-through; /* 划线作废视觉 */
      opacity: 1;
    }

    .matrix-row.is-damaged-strong .matrix-row__name:hover {
      background: transparent;
      color: var(--active);
    }

    .matrix-row.is-damaged-strong .matrix-row__value {
      color: #888;
      border-left-color: #333;
    }

    .matrix-row.is-damaged-strong .matrix-row__value:hover {
      background: var(--active);
      color: #fff;
    }

    /* 列底难度提示 */
    .matrix-col__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-top: 1px solid var(--line-strong);
      background: var(--paper-strong);
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--ink);
    }

    .matrix-col.is-damaged-strong .matrix-col__footer {
      background: #111;
      color: #666;
      border-top-color: #333;
    }

    /* 操作工具栏 */
    .matrix-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 12px 16px;
      font-family: var(--font-ui);
    }

    .matrix-tools__group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .matrix-help-btn {
      width: 24px;
      min-width: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 0;
      background: var(--paper-strong);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: bold;
      line-height: 1;
      box-shadow: 1px 1px 0 rgba(26,23,20,0.2);
    }

    .matrix-help-btn:hover,
    .matrix-help-btn.is-active {
      background: var(--panel);
      border-color: var(--panel);
      color: #fff;
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 rgba(26,23,20,0.3);
    }

    .matrix-help-text {
      font-size: 13px;
      color: var(--ink-dim);
    }

    .gap-btn {
      min-width: 32px;
    }

    .mini-btn.is-active,
    .gap-btn.is-active {
      background: var(--roll);
      color: var(--roll-ink);
      border-color: var(--roll);
    }

    .gap-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 0;
      background: var(--paper-strong);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-size: 13px;
    }

    .gap-summary.is-muted {
      background: rgba(166, 27, 18, 0.05);
      border-color: var(--active);
      color: var(--active);
    }

    .gap-edge-track {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      border-radius: 0;
      background: var(--paper-strong);
      border: 1px solid var(--line-strong);
    }

    .gap-edge {
      width: 34px;
      min-height: 20px;
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      line-height: 1;
      color: #fff;
      background: rgba(166, 27, 18, 0.8);
      border: 1px solid rgba(0,0,0,0.3);
    }

    .gap-edge.is-open {
      background: rgba(74, 107, 34, 0.8);
      color: #fff;
    }

    /* 损伤角标：低饱和暗色提示 */
    .damage-corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-top: 12px solid rgba(58, 28, 28, 0.48);
      border-left: 14px solid transparent;
      filter: saturate(0.45);
      pointer-events: none;
    }

    /* 栏目区块 (忍法/背景/忍具) */
    .section-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-card {
      overflow: hidden;
    }

    .section-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      background: var(--panel);
      color: #fff;
      border-bottom: 2px solid var(--line-strong);
    }

    .section-card__title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      font-family: var(--font-main);
    }

    .section-card__actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-card__actions .mini-btn {
      min-width: 74px;
      min-height: 30px;
      background: var(--paper);
      border-color: #fff;
      color: var(--ink);
    }

    .section-card__body {
      padding: 12px;
      display: grid;

      html += '        <span class="hp-panel__value">' + escapeHtml(String(hpCurrent)) + ' / ' + escapeHtml(String(hpMax)) + '</span>';
      html += '        <div class="hp-panel__meta">';
      html += '          <span class="chip">自动</span>';
      html += '          <button class="mini-btn" data-action="edit-number" data-key="额外生命值">额外+' + escapeHtml(String(extraHp)) + '</button>';
      html += '        </div>';
      html += '      </div>';
      html += '      <div class="summary__chips">';
      html += '        <span class="chip chip--danger">损伤分野：' + escapeHtml(localizedDamageText) + '</span>';
      html += '        <span class="chip chip--danger">损伤列数：' + escapeHtml(String(damagedCategories.length)) + '</span>';
      html += '        <span class="chip">上下连通：' + (meta.connectivity.topBottom ? '开' : '关') + '</span>';
      html += '        <span class="chip">左右连通：' + (meta.connectivity.leftRight ? '开' : '关') + '</span>';
      html += '      </div>';
      html += '    </div>';
      html += '  </section>';

      html += '  <section class="matrix-tools">';
      html += '    <div class="matrix-tools__group">';
      html += '      <strong>连通</strong>';
      html += '      <button class="mini-btn' + (meta.connectivity.topBottom ? ' is-active' : '') + '" data-action="toggle-connectivity" data-key="topBottom">上下</button>';
      html += '      <button class="mini-btn' + (meta.connectivity.leftRight ? ' is-active' : '') + '" data-action="toggle-connectivity" data-key="leftRight">左右</button>';
      html += '    </div>';
      html += '    <div class="matrix-tools__group">';
      html += '      <strong>手动空隙</strong>';
      for (var gapIdx = 0; gapIdx < gapButtonCount; gapIdx += 1) {
        html += '      <button class="mini-btn gap-btn' + (manualGapIndices.indexOf(gapIdx) >= 0 ? ' is-active' : '') + '" data-action="toggle-gap" data-gap="' + gapIdx + '">' + escapeHtml(String(gapIdx + 1)) + '</button>';
      }
      html += '      <span class="gap-summary' + (specialtyCategories.length > 0 ? ' is-muted' : '') + '">' + escapeHtml(getGapSummaryText(meta)) + '</span>';
      html += '      <span class="gap-edge-track">';
      for (var edgeIdx = 0; edgeIdx < gapButtonCount; edgeIdx += 1) {
        var isOpen = table.gaps[edgeIdx] === false;
        html += '    <span class="gap-edge' + (isOpen ? ' is-open' : '') + '" title="' + escapeHtml(isOpen ? '连通边' : '空隙边') + '">' + escapeHtml(getGapEdgeLabel(edgeIdx, !!meta.connectivity.leftRight)) + '</span>';
      }
      html += '      </span>';
      html += '    </div>';
      html += '    <div class="matrix-tools__group">';
      html += '      <button class="matrix-help-btn' + (state.helpUi.matrixHintOpen ? ' is-active' : '') + '" data-action="toggle-matrix-hint" title="操作说明">?</button>';
      if (state.helpUi.matrixHintOpen) {
        html += '      <span class="matrix-help-text">点击特技左侧切换修得状态，点击特技名或数值触发掷骰。</span>';
      }
      html += '    </div>';
      html += '  </section>';

      html += '  <div class="matrix-scroll">';
      html += '  <section class="matrix-shell">';
      CATEGORIES.forEach(function (category) {
        var damaged = meta.damageSwitches[category] === 1;
        html += '    <div class="matrix-col' + (damaged ? ' is-damaged is-damaged-strong' : '') + '">';
        html += '      <div class="matrix-col__header">';
        html += '        <div class="matrix-col__title">';
        html += '          <span>' + escapeHtml(getDisplayLabel(category, meta.locale)) + '</span>';
        html += damaged ? '          <span class="matrix-col__seal-icon" aria-hidden="true"></span>' : '          <span>&nbsp;</span>';
        html += '        </div>';
        html += '        <div class="matrix-col__toggles">';
        html += '          <button class="matrix-col__toggle matrix-col__toggle--specialty' + (meta.specialtySwitches[category] ? ' is-active' : '') + '" data-action="toggle-specialty" data-category="' + escapeHtml(category) + '">得意</button>';
        html += '          <button class="matrix-col__toggle' + (meta.damageSwitches[category] ? ' is-active' : '') + '" data-action="toggle-damage" data-category="' + escapeHtml(category) + '">损伤</button>';
        html += '        </div>';
        html += '      </div>';
        if (damaged) {
          html += '      <div class="matrix-col__damage-bar"></div>';
        }
        html += '      <div class="matrix-grid">';
        SKILL_MATRIX[category].forEach(function (skill) {
          var isOn = meta.skillSwitches[skill] === 1;
          var target = table.targetValue(skill);
          var rowClass = 'matrix-row';
          if (isOn && !damaged) rowClass += ' is-active';
          if (isOn && !damaged) rowClass += ' category-' + CATEGORIES.indexOf(category);
          if (damaged) rowClass += ' is-damaged';
          if (damaged) rowClass += ' is-damaged-strong';
          html += '        <div class="' + rowClass + '">';
          html += '          <button class="matrix-row__toggle' + (isOn ? ' is-on' : '') + '" data-action="toggle-skill" data-skill="' + escapeHtml(skill) + '">' + (isOn ? '●' : '') + '</button>';
          html += '          <button class="matrix-row__name" title="' + escapeHtml(getDisplayLabel(skill, meta.locale)) + '" data-action="open-roll" data-skill="' + escapeHtml(skill) + '" data-target-value="' + escapeHtml(String(target)) + '">' + escapeHtml(getDisplayLabel(skill, meta.locale)) + (damaged ? '<span class="damage-corner"></span>' : '') + '</button>';
          html += '          <button class="matrix-row__value" data-action="open-roll" data-skill="' + escapeHtml(skill) + '" data-target-value="' + escapeHtml(String(target)) + '">' + escapeHtml(String(target)) + (damaged ? '<span class="damage-corner"></span>' : '') + '</button>';
          html += '        </div>';
        });
        html += '      </div>';
        html += '      <div class="matrix-col__footer">';
        html += '        <span>难度</span>';
        html += '        <strong>' + escapeHtml(table.averageTarget(category)) + '</strong>';
        html += '      </div>';
        html += '    </div>';
      });
      html += '  </section>';
      html += '  </div>';

      html += '  <section class="section-list">';
      Object.keys(SLOT_CONFIG).forEach(function (key) {
        var cfg = SLOT_CONFIG[key];
        var ui = state.sectionUi[key];
        var slots = meta.slots[key];
        var visibleCount = getVisibleCount(key, slots);
        var filledCount = key === 'tool' ? countFilledToolSlots(slots) : countFilledSlots(slots);
        html += '    <div class="section-card">';
        html += '      <div class="section-card__header">';
        html += '        <div class="section-card__title">' + escapeHtml(cfg.label) + '（' + escapeHtml(String(filledCount)) + '）</div>';
        html += '        <div class="section-card__actions">';
        html += '          <button class="mini-btn" data-action="toggle-section" data-section="' + escapeHtml(key) + '">' + (ui.collapsed ? '显示' : '隐藏') + '</button>';
        html += '        </div>';
        html += '      </div>';
        if (visibleCount > 0) {
          html += '      <div class="section-card__body' + (shouldUseScrollBody(key, ui) ? ' section-card__body--scroll" data-section-body="' + escapeHtml(key) : '') + '">';
          if (key === 'tool') {
            getToolEntries(slots).slice(0, visibleCount).forEach(function (entry) {
              var editingTool = isToolInlineEditing(entry.kind, entry.index);
              html += '        <div class="slot-btn tool-slot' + (!hasToolEntryContent(entry) ? ' is-empty' : '') + (editingTool ? ' is-editing' : '') + '" data-tool-kind="' + escapeHtml(entry.kind) + '" data-index="' + entry.index + '" title="' + escapeHtml(getToolSlotTitle(entry)) + '">';
              html += '          <div class="tool-slot__main">';
              html += '            <span class="slot-btn__index">' + escapeHtml(entry.kind === 'fixed' ? '固定忍具' : ('自定义 ' + String(entry.index + 1))) + '</span>';
              if (editingTool && entry.kind === 'custom') {
                html += '            <input id="toolInlineNameInput" class="tool-slot__inline-input" type="text" value="' + escapeHtml(state.toolInlineEditor.type) + '" data-tool-inline-field="type">';
              } else {
                html += '            <span class="slot-btn__text">' + escapeHtml(getToolSlotDisplayText(entry)) + '</span>';
              }
              html += '            <span class="tool-slot__meta">';
              html += '              <span class="tool-slot__kind">' + escapeHtml(entry.kind === 'fixed' ? '固定槽' : '自定义槽') + '</span>';
              html += '              <span class="tool-slot__kind">' + escapeHtml(editingTool ? '编辑中' : '双击编辑') + '</span>';
              html += '            </span>';
              html += '          </div>';
              html += '          <div class="tool-slot__count-wrap">';
              html += '            <span class="tool-slot__count-label">数量</span>';
              if (editingTool) {
                html += '            <input id="toolInlineCountInput" class="tool-slot__inline-input tool-slot__inline-input--count" type="number" min="0" value="' + escapeHtml(state.toolInlineEditor.count) + '" data-tool-inline-field="count">';
              } else {
                html += '            <span class="tool-slot__count">' + escapeHtml(String(normalizeToolCount(entry.count))) + '</span>';
              }
              html += '          </div>';
              html += '        </div>';
            });
          } else {
            slots.slice(0, visibleCount).forEach(function (slotText, index) {
              html += '        <button class="slot-btn' + (!slotText ? ' is-empty' : '') + '" data-action="edit-slot" data-group="' + escapeHtml(key) + '" data-index="' + index + '" title="' + escapeHtml(slotText || ('编辑' + cfg.label)) + '">';
              html += '          <span class="slot-btn__index">' + escapeHtml(cfg.label) + ' ' + escapeHtml(String(index + 1)) + '</span>';
              html += '          <span class="slot-btn__text">' + escapeHtml(slotText || '点击填写') + '</span>';
              html += '        </button>';
            });
          }
          html += '      </div>';
        }
        html += '    </div>';
      });
      html += '  </section>';

      if (state.rollDialog.open) {
        html += '  <div class="overlay" data-action="close-roll">';
        html += '    <div class="dialog" data-dialog-panel="1">';
        html += '      <div class="dialog__header">';
        html += '        <div class="dialog__title">' + escapeHtml(getDisplayLabel(state.rollDialog.skill, meta.locale)) + ' 检定</div>';
        html += '        <button class="dialog-btn" data-action="close-roll">关闭</button>';
        html += '      </div>';
        html += '      <div class="dialog__body">';
        html += '        <div class="field-label">目标值</div>';
        html += '        <div class="formula-preview">' + escapeHtml(String(state.rollDialog.targetValue)) + '</div>';
        html += '        <div class="field-label">快捷加值</div>';
        html += '        <div class="modifier-grid">';
        ['+1', '-1', '+2', '-2', '+3', '-3'].forEach(function (mod) {
          html += '          <button class="modifier-btn' + (state.rollDialog.modifier === mod ? ' is-active' : '') + '" data-action="set-roll-modifier" data-modifier="' + mod + '">' + mod + '</button>';
        });
        html += '        </div>';
        html += '        <div class="field-label">自定义加值</div>';
        html += '        <input id="rollModifierInput" class="field-input" type="number" step="1" value="' + escapeHtml(state.rollDialog.modifier) + '" placeholder="例如 +4 / -2">';
        html += '        <button class="mini-btn" data-action="set-roll-modifier" data-modifier="">无修正</button>';
        html += '        <div class="field-label">最终发送</div>';
        html += '        <div id="rollExpressionPreview" class="formula-preview">' + escapeHtml(buildShinobiRollExpression(state.rollDialog.skill, state.rollDialog.targetValue, state.rollDialog.modifier)) + '</div>';
        html += '        <div class="field-label">点击发送会进行掷骰</div>';
      html += '      </div>';
        html += '      <div class="dialog__footer">';
        html += '        <button class="dialog-btn" data-action="close-roll">取消</button>';
        html += '        <button class="dialog-btn dialog-btn--primary" data-action="confirm-roll">发送</button>';
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';
      }

      if (state.editorDialog.open) {
        html += '  <div class="overlay" data-action="close-editor">';
        html += '    <div class="dialog" data-dialog-panel="1">';
        html += '      <div class="dialog__header">';
        html += '        <div class="dialog__title">' + escapeHtml(state.editorDialog.title) + '</div>';
        html += '        <button class="dialog-btn" data-action="close-editor">关闭</button>';
        html += '      </div>';
        html += '      <div class="dialog__body">';
        html += '        <div class="field-label">' + (state.editorDialog.kind === 'number' ? '请输入数字' : '请输入内容') + '</div>';
        if (state.editorDialog.kind === 'number') {
          html += '      <input id="editorInput" class="field-input" type="number" value="' + escapeHtml(state.editorDialog.value) + '">';
        } else {
          html += '      <textarea id="editorInput" class="field-textarea">' + escapeHtml(state.editorDialog.value) + '</textarea>';
        }
        html += '      </div>';
        html += '      <div class="dialog__footer">';
        html += '        <button class="dialog-btn" data-action="close-editor">取消</button>';
        html += '        <button class="dialog-btn dialog-btn--primary" data-action="confirm-editor">保存</button>';
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';
      }

      html += '</div>';
      root.innerHTML = html;
      restoreSectionScrollPositions(root);
      restoreMatrixScrollPosition(root);
    }

    document.addEventListener('input', function (event) {
      var target = event.target;
      if (target && target.id === 'editorInput') {
        state.editorDialog.value = target.value;
      } else if (target && target.id === 'rollModifierInput') {
        state.rollDialog.modifier = target.value;
        syncRollExpressionPreview();
      } else if (target && target.id === 'toolInlineNameInput') {
        state.toolInlineEditor.type = target.value;
      } else if (target && target.id === 'toolInlineCountInput') {
        state.toolInlineEditor.count = target.value;
      }
    });

    document.addEventListener('mousedown', beginMatrixDragScroll);
    document.addEventListener('mousemove', updateMatrixDragScroll);
    document.addEventListener('mouseup', endMatrixDragScroll);

    document.addEventListener('click', function (event) {
      if (state.dragScroll.suppressClick) {
        state.dragScroll.suppressClick = false;
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      var target = event.target;
      while (target && target !== document.body) {
        if (target.dataset && target.dataset.dialogPanel === '1') {
          return;
        }
        if (target.dataset && target.dataset.action) {
          var action = target.dataset.action;
          if (action === 'toggle-specialty') {
            (function (category) {
              applyMetaMutation(function (meta) {
                meta.specialtySwitches[category] = meta.specialtySwitches[category] ? 0 : 1;
              });
            })(target.dataset.category);
            return;
          }
          if (action === 'toggle-damage') {
            (function (category) {
              applyMetaMutation(function (meta) {
                meta.damageSwitches[category] = meta.damageSwitches[category] ? 0 : 1;
              });
            })(target.dataset.category);
            return;
          }
          if (action === 'toggle-connectivity') {
            (function (key) {
              applyMetaMutation(function (meta) {
                meta.connectivity[key] = meta.connectivity[key] ? 0 : 1;
                if (key === 'leftRight' && !meta.connectivity[key]) {
                  meta.manualGaps[5] = 0;
                }
              });
            })(target.dataset.key);
            return;
          }
          if (action === 'toggle-gap') {
            (function (gapKey) {
              applyMetaMutation(function (meta) {
                var numericGap = toInteger(gapKey, -1);
                var maxGap = meta.connectivity.leftRight ? GAP_PAIRS.length : GAP_PAIRS.length - 1;
                if (numericGap < 0 || numericGap > maxGap) return;
                meta.manualGaps[String(numericGap)] = meta.manualGaps[String(numericGap)] ? 0 : 1;
              });
            })(target.dataset.gap);
            return;
          }
          if (action === 'toggle-skill') {
            (function (skill) {
              applyMetaMutation(function (meta) {
                meta.skillSwitches[skill] = meta.skillSwitches[skill] ? 0 : 1;
              });
            })(target.dataset.skill);
            return;
          }
          if (action === 'open-roll') {
            openRollDialog(target.dataset.skill, toInteger(target.dataset.targetValue, 12));
            return;
          }
          if (action === 'set-roll-modifier') {
            state.rollDialog.modifier = target.dataset.modifier || '';
            render();
            return;
          }
          if (action === 'confirm-roll') {
            confirmRollDialog();
            return;
          }
          if (action === 'close-roll') {
            closeRollDialog();
            return;
          }
          if (action === 'edit-number') {
            var key = target.dataset.key;
            openEditorDialog('number', key, state.attrs[key] == null ? '' : state.attrs[key], { key: key });
            return;
          }
          if (action === 'edit-slot') {
            var group = target.dataset.group;
            var index = toInteger(target.dataset.index, -1);
            if (group && index >= 0) {
              openEditorDialog('slot', SLOT_CONFIG[group].label + ' ' + (index + 1), state.meta.slots[group][index], { group: group, index: index });
            }
            return;
          }
          if (action === 'confirm-editor') {
            confirmEditorDialog();
            return;
          }
          if (action === 'close-editor') {
            closeEditorDialog();
            return;
          }
          if (action === 'toggle-section') {
            var section = target.dataset.section;
            state.sectionUi[section].collapsed = !state.sectionUi[section].collapsed;
            render();
            return;
          }
          if (action === 'toggle-locale') {
            applyMetaMutation(function (meta) {
              meta.locale = meta.locale === 'zh-Hant' ? 'zh-Hans' : 'zh-Hant';
            });
            return;
          }
              if (action === 'toggle-compact-mode') {
                applyMetaMutation(function (meta) {
                  meta.compactMode = meta.compactMode ? 0 : 1;
                });
                return;
              }
              if (action === 'toggle-matrix-hint') {
                state.helpUi.matrixHintOpen = !state.helpUi.matrixHintOpen;
                render();
                return;
              }
            }
            target = target.parentElement;
          }
    });

    document.addEventListener('dblclick', function (event) {
      var target = event.target;
      if (!target || !target.closest) return;
      var toolSlot = target.closest('[data-tool-kind]');
      if (!toolSlot) return;
      var toolKind = toolSlot.dataset.toolKind;
      var toolIndex = toInteger(toolSlot.dataset.index, -1);
      var toolSlots = normalizeToolSlots(state.meta && state.meta.slots ? state.meta.slots.tool : null);
      var toolEntry = null;
      if (toolKind === 'fixed' && toolIndex >= 0 && toolIndex < toolSlots.fixed.length) {
        toolEntry = toolSlots.fixed[toolIndex];
      } else if (toolKind === 'custom' && toolIndex >= 0 && toolIndex < toolSlots.custom.length) {
        toolEntry = toolSlots.custom[toolIndex];
      }
      if (!toolEntry) return;
      openToolInlineEditor(toolKind, toolIndex, toolEntry);
    });

    document.addEventListener('touchend', function (event) {
      var target = event.target;
      if (!target || !target.closest) return;
      if (target.closest('input, textarea, select, option')) return;
      var toolSlot = target.closest('[data-tool-kind]');
      if (!toolSlot) return;
      var toolKind = toolSlot.dataset.toolKind;
      var toolIndex = toInteger(toolSlot.dataset.index, -1);
      var now = Date.now();
      var isSameSlot = state.touchToolEdit.kind === toolKind && state.touchToolEdit.index === toolIndex;
      if (isSameSlot && now - state.touchToolEdit.time <= 360) {
        state.touchToolEdit.time = 0;
        state.touchToolEdit.kind = '';
        state.touchToolEdit.index = -1;
        var toolSlots = normalizeToolSlots(state.meta && state.meta.slots ? state.meta.slots.tool : null);
        var toolEntry = null;
        if (toolKind === 'fixed' && toolIndex >= 0 && toolIndex < toolSlots.fixed.length) {
          toolEntry = toolSlots.fixed[toolIndex];
        } else if (toolKind === 'custom' && toolIndex >= 0 && toolIndex < toolSlots.custom.length) {
          toolEntry = toolSlots.custom[toolIndex];
        }
        if (!toolEntry) return;
        openToolInlineEditor(toolKind, toolIndex, toolEntry);
        return;
      }
      state.touchToolEdit.time = now;
      state.touchToolEdit.kind = toolKind;
      state.touchToolEdit.index = toolIndex;
    });

    document.addEventListener('scroll', function (event) {
      var body = event.target;
      if (!body || !body.dataset) return;
      if (body.classList && body.classList.contains('matrix-scroll')) {
        state.matrixScrollLeft = body.scrollLeft;
        return;
      }
      var sectionKey = body.dataset.sectionBody;
      if (!sectionKey) return;
      state.sectionScrollTop[sectionKey] = body.scrollTop;
    }, true);

    document.addEventListener('focusout', function (event) {
      var target = event.target;
      if (!target || (target.id !== 'toolInlineNameInput' && target.id !== 'toolInlineCountInput')) return;
      window.setTimeout(function () {
        var active = document.activeElement;
        if (active && (active.id === 'toolInlineNameInput' || active.id === 'toolInlineCountInput')) return;
        confirmToolInlineEditor();
      }, 0);
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        if (state.rollDialog.open) {
          closeRollDialog();
          return;
        }
        if (state.toolInlineEditor.open) {
          closeToolInlineEditor();
          return;
        }
        if (state.editorDialog.open) {
          closeEditorDialog();
          return;
        }
      }
      if (event.key === 'Enter' && state.toolInlineEditor.open) {
        event.preventDefault();
        confirmToolInlineEditor();
        return;
      }
      if (event.key === 'Enter' && !event.shiftKey && state.editorDialog.open && state.editorDialog.kind !== 'slot') {
        event.preventDefault();
        confirmEditorDialog();
      }
    });

    window.addEventListener('blur', endMatrixDragScroll);
    window.addEventListener('resize', syncResponsiveLayout);

    sealchat.onUpdate(function (data) {
      var attrs = data && data.attrs && typeof data.attrs === 'object' ? data.attrs : {};
      if (state.pendingPatch && attrsContainsPatch(attrs, state.pendingPatch)) {
        state.pendingPatch = null;
        state.pendingPatchHash = '';
      }
      state.name = data && data.name ? data.name : '';
      state.avatarUrl = data && data.avatarUrl ? data.avatarUrl : '';
      state.attrs = attrs;
      state.meta = normalizeMeta(attrs[SHINOBI_META_KEY]);
      state.lastIncomingHash = stableStringify(attrs);
      render();
      var derivedPatch = buildDerivedPatch(attrs);
      if (Object.keys(derivedPatch).length > 0) {
        sendPatch(derivedPatch);
      }
    });
  </script>
</body>
</html>
